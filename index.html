    sel.appendChild(opt);
  });
}

// 从云端加载数据
async function loadCloudData(){
  try{
    let res = await axios.get(API, {headers:HEADERS});
    let cloud = res.data.record;
    if(cloud && cloud.length>100) originalData = cloud;
    else originalData = JSON.parse(JSON.stringify(initData));
  }catch(e){
    originalData = JSON.parse(JSON.stringify(initData));
  }
}

// 上传云端保存（点击 修改保存 才执行）
async function saveCloudData(){
  try{
    await axios.put(API, originalData, {headers:HEADERS});
    document.getElementById("tip").innerText = "✅ 修改已保存到云端，所有人同步更新！";
    setTimeout(()=>tip.innerText="",3000);
  }catch(e){
    alert("保存失败，请重试");
  }
}

// 渲染表格
function renderTable(){
  filteredData = [...originalData];
  filterTable();
}

// 筛选功能
function filterTable(){
  let t = document.getElementById("filterType").value;
  let u = document.getElementById("filterUnit").value;
  filteredData = originalData.filter(row=>{
    return (t=="" || row[3]==t) && (u=="" || row[4]==u);
  });
  renderFiltered();
}

function renderFiltered(){
  let html = "";
  filteredData.forEach(row=>{
    html+=`<tr>
      <td>${row[0]}</td>
      <td>${row[1]}</td>
      <td>${row[2]}</td>
      <td>${row[3]}</td>
      <td>${row[4]}</td>
      <td contenteditable data-index="${row[0]}" data-col="5">${row[5]}</td>
      <td contenteditable data-index="${row[0]}" data-col="6">${row[6]}</td>
      <td contenteditable data-index="${row[0]}" data-col="7">${row[7]}</td>
    </tr>`;
  });
  document.getElementById("tableBody").innerHTML = html;
}

// 监听编辑（只修改本地，不上传）
function listenEdit(){
  document.addEventListener('blur', function(e){
    if(e.target && e.target.hasAttribute('contenteditable')){
      let idx = e.target.dataset.index;
      let col = e.target.dataset.col;
      let val = e.target.innerText.trim();
      let item = originalData.find(r=>r[0]==idx);
      if(item) item[col] = val;
      calc();
    }
  }, true);
}

// 自动统计合计
function calc(){
  let sumR=0,sumA=0;
  originalData.forEach(r=>{
    sumR += parseFloat(r[5]) || 0;
    sumA += parseFloat(r[6]) || 0;
  });
  document.getElementById("totalRemaining").innerText = sumR.toFixed(2);
  document.getElementById("totalApril").innerText = sumA.toFixed(2);
}

// 导出Excel
function exportExcel(){
  let ws = XLSX.utils.aoa_to_sheet([
    ["序号","所在区","项目名称","项目类别","责任单位","剩余投资(万元)","4月预计(万元)","备注"],
    ...originalData
  ]);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "固投统计");
  XLSX.writeFile(wb, "黄陂区固投统计表.xlsx");
}
